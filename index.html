<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game: Lompatan Burung Ke Sarang Puasa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b132b;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 20px;
            z-index: 10;
        }

        .interactive {
            pointer-events: auto;
        }

        /* Header Info */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 19, 43, 0.8);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Soalan Card */
        .question-card {
            background: rgba(255, 255, 255, 0.96);
            color: #1c2541;
            padding: 20px 30px;
            border-radius: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            max-width: 650px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid #48cae4;
            line-height: 1.4;
        }

        /* Pilihan Jawapan */
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto 30px auto;
            width: 100%;
        }

        .answer-btn {
            background: linear-gradient(135deg, #48cae4, #0077b6);
            color: white;
            border: 3px solid #ffffff;
            padding: 20px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        .answer-btn:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, #0077b6, #48cae4);
            box-shadow: 0 10px 25px rgba(0, 119, 182, 0.5);
        }

        /* Screens Modal */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 19, 43, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .btn-start {
            background: linear-gradient(135deg, #06d6a0, #059669);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(6, 214, 160, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-start:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 35px rgba(6, 214, 160, 0.6);
        }

        #game-ui { display: none; }
        #end-screen { display: none; }
    </style>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="start-screen" class="modal interactive">
            <img src="https://img.icons8.com/?size=100&id=101704&format=png&color=000000" alt="Burung Icon" style="width: 100px; height: 100px; margin-bottom: 20px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));">
            <h1 style="font-size: 38px; margin: 0 0 10px 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center;">Lompatan Burung Ke Sarang Puasa</h1>
            <p style="font-size: 19px; color: #a5a6f6; margin-bottom: 30px; text-align: center; max-width: 500px; line-height: 1.5;">
                Bantu burung melompat masuk ke dalam **Sarang Jawapan** yang betul. Soalan & jawapan akan diacak setiap pusingan!
            </p>
            <button class="btn-start" onclick="startGame()">START</button>
        </div>

        <!-- Game Screen -->
        <div id="game-ui" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
            <div class="header-bar">
                <span id="question-count">Soalan: 1/10</span>
                <span id="score-display">Markah: 0</span>
            </div>

            <div class="question-card" id="question-text">
                Memuatkan soalan...
            </div>

            <div class="answers-grid interactive">
                <button class="answer-btn" id="opt0" onclick="chooseAnswer(0)">Jawapan A</button>
                <button class="answer-btn" id="opt1" onclick="chooseAnswer(1)">Jawapan B</button>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="modal interactive">
            <h1 style="font-size: 50px; color: #06d6a0; margin-bottom: 10px;">🎉 PERMAINAN TAMAT! 🎉</h1>
            <img src="https://img.icons8.com/?size=100&id=101704&format=png&color=000000" alt="Burung Icon" style="width: 80px; height: 80px; margin-bottom: 10px;">
            <p style="font-size: 24px; margin: 10px 0;">Burung selamat mendiami sarang tertinggi!</p>
            <div style="font-size: 72px; font-weight: bold; margin: 20px 0; color: #ffd166;" id="final-score">0 / 100</div>
            <button class="btn-start" onclick="resetGame()">MAIN SEMULA</button>
        </div>
    </div>

<script>
    const BIRD_ICON_URL = "https://img.icons8.com/?size=100&id=101704&format=png&color=000000";

    // --- AUDIO SYNTHESIZER (Web Audio API) ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioCtx();
    }

    function playSound(type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;

        if (type === 'correct') {
            // Bunyi "Happy Ting-Ting!" - Dua nada harmonik berurutan yang ceria
            const notes = [587.33, 880.00]; // Nota D5 dan A5 (bunyi chime yang ceria)
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle'; // Bunyi jenis lembut seperti flute/chime
                osc.frequency.setValueAtTime(freq, now + (index * 0.08));
                
                gain.gain.setValueAtTime(0.25, now + (index * 0.08));
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4 + (index * 0.08));
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now + (index * 0.08));
                osc.stop(now + 0.5 + (index * 0.08));
            });
        } 
        else if (type === 'wrong') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(260, now);
            osc.frequency.linearRampToValueAtTime(50, now + 0.6);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.6);
        }
        else if (type === 'happy_end') {
            const notes = [523.25, 659.25, 783.99, 1046.50]; 
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now + (index * 0.12));
                gain.gain.setValueAtTime(0.2, now + (index * 0.12));
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.7 + (index * 0.12));
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.12));
                osc.stop(now + 0.8 + (index * 0.12));
            });
        }
    }

    // --- DATA SOALAN ASAL ---
    const masterQuizData = [
        { q: "Apakah maksud puasa?", options: [{ t: "Menahan diri daripada perkara membatalkan puasa dari terbit fajar hingga terbenam matahari beserta niat", c: true }, { t: "Tidak makan dan minum dari pagi hingga petang sahaja", c: false }] },
        { q: "Pilih syarat WAJIB puasa yang betul:", options: [{ t: "Tidak berakal", c: false }, { t: "Islam", c: true }] },
        { q: "Pilih syarat SAH puasa yang betul:", options: [{ t: "Suci daripada haid dan nifas", c: true }, { t: "Pengsan sepanjang hari", c: false }] },
        { q: "Pilih RUKUN puasa yang betul:", options: [{ t: "Berakal", c: false }, { t: "Niat", c: true }] },
        { q: "Pilih syarat wajib puasa yang SALAH:", options: [{ t: "Mampu berpuasa", c: false }, { t: "Tidak berakal", c: true }] },
        { q: "Bilakah kita perlu berniat puasa Ramadan?", options: [{ t: "Pada siang hari", c: false }, { t: "Waktu malam sebelum berpuasa", c: true }] },
        { q: "Adakah sah puasa bagi orang yang mabuk?", options: [{ t: "Tidak sah", c: true }, { t: "Sah", c: false }] },
        { q: "Adakah orang bukan Islam wajib berpuasa?", options: [{ t: "Wajib", c: false }, { t: "Tidak wajib", c: true }] },
        { q: "Jika seorang perempuan sedang haid atau nifas, adakah puasanya sah?", options: [{ t: "Sah", c: false }, { t: "Tidak sah", c: true }] },
        { q: "Adakah seorang lelaki Islam, berumur 30 tahun, berakal dan sihat tubuh badan wajib berpuasa?", options: [{ t: "Tidak wajib puasa", c: false }, { t: "Wajib puasa", c: true }] }
    ];

    let activeQuizData = []; 
    let currentQ = 0;
    let score = 0;
    let isAnimating = false;

    // --- FUNGSI SHUFFLE ---
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    style = ""; 
    function prepareQuestions() {
        activeQuizData = JSON.parse(JSON.stringify(masterQuizData));
        shuffleArray(activeQuizData);
        activeQuizData.forEach(question => {
            shuffleArray(question.options);
        });
    }

    // --- THREE.JS SCENE SETUP ---
    let scene, camera, renderer;
    let birdSprite, leftNestMesh, rightNestMesh;
    let leftNestRing, rightNestRing;
    let currentY = 0; 
    let backgroundStars;

    function init3D() {
        const container = document.getElementById('canvas-container');
        
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b132b);
        scene.fog = new THREE.Fog(0x0b132b, 10, 60);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(0, 10, 5);
        scene.add(dirLight);

        const textureLoader = new THREE.TextureLoader();
        const birdTexture = textureLoader.load(BIRD_ICON_URL);
        const spriteMaterial = new THREE.SpriteMaterial({ map: birdTexture, transparent: true });
        birdSprite = new THREE.Sprite(spriteMaterial);
        birdSprite.scale.set(2.2, 2.2, 1); 
        scene.add(birdSprite);

        function createNestMesh() {
            const nestGroup = new THREE.Group();
            const nestMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.9 });
            
            const ringGeo1 = new THREE.TorusGeometry(1.6, 0.3, 8, 24);
            const ring1 = new THREE.Mesh(ringGeo1, nestMat);
            ring1.rotation.x = Math.PI / 2;
            nestGroup.add(ring1);

            const ringGeo2 = new THREE.TorusGeometry(1.4, 0.25, 8, 24);
            const ring2 = new THREE.Mesh(ringGeo2, nestMat);
            ring2.rotation.x = Math.PI / 2;
            ring2.position.y = -0.2;
            nestGroup.add(ring2);

            const baseGeo = new THREE.CylinderGeometry(1.2, 1.0, 0.2, 24);
            const base = new THREE.Mesh(baseGeo, nestMat);
            base.position.y = -0.3;
            nestGroup.add(base);

            return { group: nestGroup, mainRing: ring1 };
        }

        const nestLeftData = createNestMesh();
        const nestRightData = createNestMesh();
        
        leftNestMesh = nestLeftData.group;
        leftNestRing = nestLeftData.mainRing;
        
        rightNestMesh = nestRightData.group;
        rightNestRing = nestRightData.mainRing;

        scene.add(leftNestMesh);
        scene.add(rightNestMesh);

        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 500;
        const posArray = new Float32Array(starsCount * 3);
        for(let i=0; i<starsCount*3; i++) {
            posArray[i] = (Math.random() - 0.5) * 120;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMat = new THREE.PointsMaterial({ size: 0.15, color: 0x64dfdf });
        backgroundStars = new THREE.Points(starsGeo, starsMat);
        scene.add(backgroundStars);

        updateStage3D(true);

        camera.position.set(0, 3, 12);
        camera.lookAt(0, 2, 0);

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function updateStage3D(isInit = false) {
        leftNestMesh.position.set(-3.5, currentY + 5, 0);
        rightNestMesh.position.set(3.5, currentY + 5, 0);
        
        if(isInit) {
            birdSprite.position.set(0, currentY + 0.3, 0.2);
        }
        if(backgroundStars) backgroundStars.position.y = currentY;
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        if (!isAnimating) {
            birdSprite.position.y = (currentY + 0.3) + Math.sin(Date.now() * 0.005) * 0.1;
        }

        renderer.render(scene, camera);
    }

    // --- LOGIK PERMAINAN ---
    function startGame() {
        initAudio();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        
        prepareQuestions();
        
        currentQ = 0;
        score = 0;
        currentY = 0;
        
        birdSprite.position.set(0, 0.3, 0.2);
        birdSprite.material.rotation = 0;
        birdSprite.material.opacity = 1;
        
        updateStage3D(true);
        loadQuestion();
    }

    function loadQuestion() {
        isAnimating = false;
        
        leftNestRing.material.color.setHex(0x8b5a2b);
        rightNestRing.material.color.setHex(0x8b5a2b);

        const q = activeQuizData[currentQ];
        document.getElementById('question-count').innerText = `Soalan: ${currentQ + 1}/10`;
        document.getElementById('score-display').innerText = `Markah: ${score}`;
        document.getElementById('question-text').innerText = q.q;

        document.getElementById('opt0').innerText = q.options[0].t;
        document.getElementById('opt1').innerText = q.options[1].t;
        
        camera.position.y = currentY + 3;
        camera.lookAt(0, currentY + 2, 0);
        
        updateStage3D();
    }

    function chooseAnswer(index) {
        if (isAnimating) return;
        isAnimating = true;

        const isCorrect = activeQuizData[currentQ].options[index].c;
        const targetX = index === 0 ? -3.5 : 3.5;
        const targetY = currentY + 5;
        const selectedNestRing = index === 0 ? leftNestRing : rightNestRing;

        let startTime = null;
        const duration = 850; 
        const startX = birdSprite.position.x;
        const startY = birdSprite.position.y;

        function animateJump(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            const easedProgress = progress * (2 - progress);

            birdSprite.position.x = startX + (targetX - startX) * easedProgress;
            
            const jumpArc = Math.sin(progress * Math.PI) * 3.5;
            birdSprite.position.y = startY + ((targetY + 0.3) - startY) * easedProgress + jumpArc;

            if (progress < 1) {
                requestAnimationFrame(animateJump);
            } else {
                checkResult();
            }
        }

        function checkResult() {
            if (isCorrect) {
                playSound('correct');
                score += 10;
                document.getElementById('score-display').innerText = `Markah: ${score}`;
                
                selectedNestRing.material.color.setHex(0x06d6a0); 
                currentY = targetY; 

                setTimeout(() => {
                    currentQ++;
                    if (currentQ < activeQuizData.length) {
                        loadQuestion();
                    } else {
                        endGame();
                    }
                }, 1000); 
            } else {
                selectedNestRing.material.color.setHex(0xef4444); 
                animateFall();
            }
        }

        requestAnimationFrame(animateJump);
    }

    function animateFall() {
        let startTime = null;
        const startY = birdSprite.position.y;
        const startX = birdSprite.position.x;
        
        playSound('wrong'); 

        function fallStep(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = (timestamp - startTime) / 800;

            if (progress < 1) {
                birdSprite.position.y = startY - (progress * 13);
                birdSprite.position.x = startX + (startX > 0 ? 0.5 : -0.5) * progress;
                birdSprite.material.rotation += 0.15;
                birdSprite.material.opacity = 1 - progress;
                
                requestAnimationFrame(fallStep);
            } else {
                currentQ++;
                birdSprite.position.set(0, currentY + 0.3, 0.2);
                birdSprite.material.rotation = 0;
                birdSprite.material.opacity = 1;
                
                if (currentQ < activeQuizData.length) {
                    setTimeout(loadQuestion, 200);
                } else {
                    endGame();
                }
            }
        }
        requestAnimationFrame(fallStep);
    }

    document.write("");
    function endGame() {
        playSound('happy_end'); 
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = `${score} / 100`;
    }

    function resetGame() {
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
    }

    window.onload = init3D;
</script>
</body>
</html>
